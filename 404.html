<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Denied — Beyond Potential</title>
  <meta name="robots" content="noindex, nofollow" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black:    #080808;
      --gold:     #c9922a;
      --gold-lt:  #e5b04a;
      --gold-dim: #7a5518;
      --ivory:    #f0e8d8;
      --ivory-dim:#9e9080;
      --serif:    'Cormorant Garamond', Georgia, serif;
      --sans:     'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--black);
      color: var(--ivory);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .wrap { max-width: 480px; }
    .lock { font-size: 4rem; margin-bottom: 24px; }
    h1 { font-family: var(--serif); font-size: 2.4rem; font-weight: 600; color: var(--ivory); margin-bottom: 12px; }
    h1 em { font-style: italic; color: var(--gold-lt); }
    p { font-size: 1rem; line-height: 1.7; color: var(--ivory-dim); margin-bottom: 36px; }
    a.btn {
      display: inline-block;
      padding: 14px 36px;
      background: var(--gold);
      color: var(--black);
      font-family: var(--sans);
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-decoration: none;
    }
    a.btn:hover { background: var(--gold-lt); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="lock">🔒</div>
    <h1>Access <em>Denied</em></h1>
    <p>This content is protected. The digital edition of <strong>Beyond Potential</strong> is not available for direct download. Order your physical copy and it will be delivered straight to your door.</p>
    <a class="btn" href="/">Order Your Hard Copy →</a>
  </div>
</body>
</html>
